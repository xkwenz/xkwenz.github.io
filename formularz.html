    <main>

        <h3>(historia fotografii)</h3>
        <h1>Co sądzisz o fotografii?</h1>

        <form>
            <div class="sekcja_1">
                <label for="imie">Imię:</label>
                <input type="text" id="imie" name="imie" required>
    
                <label for="nazwisko">Nazwisko:</label>
                <input type="text" id="nazwisko" name="nazwisko" required>
            </div>

            <div class="sekcja_2">
                <label for="wiek">Wiek:</label>
                <input type="text" id="wiek" name="wiek" required>
            
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>

        
            <label for="jak_czesto">Jak często robisz zdjęcia?</label>
            <select id="jak_czesto" name="jak_czesto" required>
                <option value="">Wybierz...</option>
                <option value="codziennie">Codziennie</option>
                <option value="kilka_razy_w_tygodniu">Kilka razy w tygodniu</option>
                <option value="raz_w_tygodniu">Raz w tygodniu</option>
                <option value="sporadycznie">Sporadycznie</option>
                <option value="wcale">Nie robię zdjęć</option>
            </select>
        
            <label for="sprzet">Jakim sprzętem fotografujesz?</label>
            <input type="text" id="sprzet" name="sprzet" placeholder="np. aparat, telefon, obiektywy">
        
            <label for="wiadomosc">Twoja opinia o fotografii:</label>
            <textarea id="wiadomosc" name="wiadomosc" rows="3" required></textarea>
        
            <div class="sekcja_3">
                <button type="submit">Wyślij</button>
                <button type="reset">Wyczyść</button>
            </div>
        </form>

    </main>
